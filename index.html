<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawukon Bali — Hitung Wuku & Wara</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9933a;
    --gold-light: #e8b84b;
    --gold-pale: #f5e6c8;
    --brown-dark: #2a1a08;
    --brown: #4a2e0e;
    --brown-mid: #7a4e20;
    --cream: #fdf6e3;
    --red-bali: #8b1a1a;
    --shadow: rgba(42,26,8,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--brown-dark);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(201,147,58,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.08) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Crimson Pro', serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  /* SVG Ornament Bali */
  .ornament-top {
    width: 100%;
    text-align: center;
    padding: 10px 0 0;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  header {
    text-align: center;
    padding: 20px 0 10px;
    position: relative;
  }

  .om-symbol {
    font-size: 2.2rem;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(201,147,58,0.6);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%,100% { text-shadow: 0 0 20px rgba(201,147,58,0.4); }
    50% { text-shadow: 0 0 35px rgba(201,147,58,0.9), 0 0 60px rgba(201,147,58,0.3); }
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    color: var(--gold-light);
    letter-spacing: 2px;
    line-height: 1.3;
    text-shadow: 0 2px 8px var(--shadow);
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--gold-pale);
    opacity: 0.7;
    margin-top: 6px;
    font-style: italic;
  }

  /* Divider ornament */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Card */
  .card {
    background: linear-gradient(135deg, rgba(74,46,14,0.8), rgba(42,26,8,0.9));
    border: 1px solid rgba(201,147,58,0.3);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,147,58,0.2);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }

  .card-corner {
    position: absolute;
    width: 40px; height: 40px;
    opacity: 0.25;
  }
  .card-corner.tl { top: 6px; left: 6px; }
  .card-corner.tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .card-corner.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .card-corner.br { bottom: 6px; right: 6px; transform: scale(-1,-1); }

  label {
    display: block;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  input[type="date"] {
    width: 100%;
    padding: 12px 16px;
    background: rgba(42,26,8,0.8);
    border: 1px solid rgba(201,147,58,0.4);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }

  input[type="date"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,147,58,0.15);
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1) sepia(1) saturate(2) hue-rotate(5deg);
    cursor: pointer;
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--brown-mid), var(--gold), var(--brown-mid));
    background-size: 200% 100%;
    background-position: right;
    border: none;
    border-radius: 8px;
    color: var(--brown-dark);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 16px;
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 16px rgba(201,147,58,0.3);
  }

  button:hover {
    background-position: left;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(201,147,58,0.5);
  }

  button:active { transform: translateY(0); }

  /* Result */
  #result { display: none; animation: fadeUp 0.6s ease forwards; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .wuku-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,147,58,0.4);
    display: block;
  }

  .wuku-number {
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-top: 4px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 16px 0;
  }

  .info-box {
    background: rgba(42,26,8,0.6);
    border: 1px solid rgba(201,147,58,0.2);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .info-box .label {
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    display: block;
    margin-bottom: 4px;
  }

  .info-box .value {
    font-size: 1.05rem;
    color: var(--cream);
    font-weight: 400;
  }

  .info-box.full { grid-column: 1 / -1; }

  .section-title {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 16px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,147,58,0.3);
  }

  .sifat-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .sifat-list li {
    background: rgba(201,147,58,0.1);
    border: 1px solid rgba(201,147,58,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.9rem;
    color: var(--gold-pale);
  }

  .ramalan-row {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(201,147,58,0.1);
    font-size: 0.95rem;
    align-items: flex-start;
  }

  .ramalan-row:last-child { border-bottom: none; }

  .ramalan-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .ramalan-key { color: var(--gold); min-width: 80px; font-size: 0.85rem; }
  .ramalan-val { color: var(--gold-pale); opacity: 0.85; line-height: 1.4; }

  .pantangan-box {
    background: rgba(139,26,26,0.2);
    border: 1px solid rgba(139,26,26,0.4);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.9rem;
    color: #ffb3b3;
    margin-top: 10px;
    line-height: 1.5;
  }

  .hari-card {
    background: rgba(42,26,8,0.6);
    border: 1px solid rgba(201,147,58,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.3s;
  }
  .hari-card.baik { border-left: 3px solid #4caf50; }
  .hari-card.sedang { border-left: 3px solid var(--gold); }
  .hari-card.kurang { border-left: 3px solid #e57373; }
  .hari-card.istimewa { border-left: 3px solid #ce93d8; background: rgba(74,26,74,0.3); }

  .hari-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .hari-tanggal { font-family:'Cinzel Decorative',serif; font-size:0.85rem; color:var(--gold-light); }
  .hari-wara { font-size:0.8rem; color:var(--gold); opacity:0.8; }
  .hari-badge {
    font-size:0.7rem;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .badge-baik { background: rgba(76,175,80,0.2); color: #81c784; border: 1px solid rgba(76,175,80,0.4); }
  .badge-sedang { background: rgba(201,147,58,0.2); color: var(--gold-light); border: 1px solid rgba(201,147,58,0.4); }
  .badge-kurang { background: rgba(229,115,115,0.2); color: #ef9a9a; border: 1px solid rgba(229,115,115,0.4); }
  .badge-istimewa { background: rgba(206,147,216,0.2); color: #ce93d8; border: 1px solid rgba(206,147,216,0.4); }

  .hari-prediksi { font-size:0.9rem; color:var(--gold-pale); opacity:0.85; line-height:1.5; }
  .hari-cocok { font-size:0.8rem; color:var(--gold); opacity:0.7; margin-top:5px; }

    text-align: center;
    margin-top: 30px;
    color: var(--gold);
    opacity: 0.3;
    font-size: 1.5rem;
  }

  /* Balinese decorative SVG patterns */
  .bali-border {
    width: 100%;
    height: 24px;
    margin: 8px 0;
  }
</style>
</head>

const SAPTAWARA = [
  { nama:"Redite", urip:5 },  // Minggu
  { nama:"Soma",   urip:4 },  // Senin
  { nama:"Anggara",urip:3 },  // Selasa
  { nama:"Buda",   urip:7 },  // Rabu
  { nama:"Wraspati",urip:8 }, // Kamis
  { nama:"Sukra",  urip:6 },  // Jumat
  { nama:"Saniscara",urip:9 } // Sabtu
];

const PANCAWARA = [
  { nama:"Umanis", urip:5 },
  { nama:"Paing",  urip:9 },
  { nama:"Pon",    urip:7 },
  { nama:"Wage",   urip:4 },
  { nama:"Kliwon", urip:8 },
];

function hitung() {
  const input = document.getElementById('tgl').value;
  if (!input) { alert('Pilih tanggal lahir terlebih dahulu'); return; }

  const tgl = new Date(input + 'T00:00:00');

  // Referensi: 6 Januari 2002 = Minggu Kliwon, Wuku Sinta hari ke-1
  // Referensi terverifikasi umum dari kalender Bali
  const ref = new Date('2002-01-06T00:00:00');
  const selisih = Math.floor((tgl - ref) / 86400000);

  // Wuku (siklus 210 hari)
  let posWuku = ((selisih % 210) + 210) % 210;
  let noWuku = Math.floor(posWuku / 7);
  let wuku = WUKU[noWuku];

  // Saptawara (7 hari, Minggu=0)
  let hariJS = tgl.getDay(); // 0=Minggu
  let sapta = SAPTAWARA[hariJS];

  // Pancawara (5 hari siklus)
  // Ref 6 Jan 2002 = Kliwon (index 4)
  let posPanca = ((selisih % 5) + 5) % 5;
  let idxPancaRef = 4; // Kliwon
  let idxPanca = (idxPancaRef + posPanca) % 5;
  // Koreksi arah
  let panca = PANCAWARA[idxPanca];

  let neptu = sapta.urip + panca.urip;

  // Tampilkan
  document.getElementById('res-wuku').textContent = wuku.nama;
  document.getElementById('res-wuku-no').textContent = `Wuku ke-${wuku.no} dari 30 · Siklus Pawukon 210 Hari`;
  document.getElementById('res-sapta').textContent = sapta.nama;
  document.getElementById('res-panca').textContent = panca.nama;
  document.getElementById('res-urip-sapta').textContent = sapta.urip;
  document.getElementById('res-urip-panca').textContent = panca.urip;
  document.getElementById('res-neptu').textContent = `${sapta.urip} + ${panca.urip} = ${neptu}`;

  // Sifat
  const sifatEl = document.getElementById('res-sifat');
  sifatEl.innerHTML = wuku.sifat.map(s => `<li>${s}</li>`).join('');

  // Dewa
  document.getElementById('res-dewa').textContent =
    `Dewa pelindung wuku ${wuku.nama} adalah ${wuku.dewa}. Mereka yang lahir di wuku ini berada di bawah naungan kekuatan ${wuku.dewa} yang memberi perlindungan dan bimbingan spiritual sepanjang hidup.`;

  // Ramalan
  const ramalanData = [
    { icon:'💰', key:'Rezeki',    val: wuku.rezeki },
    { icon:'💼', key:'Karir',     val: wuku.karir },
    { icon:'❤️', key:'Asmara',   val: wuku.asmara },
  ];
  document.getElementById('res-ramalan').innerHTML = ramalanData.map(r =>
    `<div class="ramalan-row">
      <span class="ramalan-icon">${r.icon}</span>
      <span class="ramalan-key">${r.key}</span>
      <span class="ramalan-val">${r.val}</span>
    </div>`
  ).join('');

  document.getElementById('res-pantangan').innerHTML = `⚠️ <strong>Pantangan:</strong> ${wuku.pantangan}`;

  // Hide prediksi harian saat input baru
  document.getElementById('card-harian').style.display = 'none';
  window._wukuLahir = wuku;

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.style.animation = 'none';
  resultEl.offsetHeight;
  resultEl.style.animation = 'fadeUp 0.6s ease forwards';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== PREDIKSI HARIAN =====
const HARI_NAMA = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN_NAMA = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

function kualitasHari(neptSapta, neptPanca, pancaNama, saptaNama) {
  const total = neptSapta + neptPanca;
  const isTumpek = pancaNama === 'Kliwon' && saptaNama === 'Saniscara';
  const isKajengKliwon = pancaNama === 'Kliwon' && (saptaNama === 'Anggara' || saptaNama === 'Buda');
  if (isTumpek) return { label:'Tumpek 🙏', kelas:'istimewa', badge:'badge-istimewa' };
  if (isKajengKliwon) return { label:'Kajeng Kliwon', kelas:'istimewa', badge:'badge-istimewa' };
  if (total >= 15) return { label:'Hari Baik ✓', kelas:'baik', badge:'badge-baik' };
  if (total >= 11) return { label:'Sedang', kelas:'sedang', badge:'badge-sedang' };
  return { label:'Kurang Baik', kelas:'kurang', badge:'badge-kurang' };
}

function prediksiTeks(wuku, saptaNama, pancaNama, kualitas) {
  const saptaMap = {
    'Redite':   'Cocok untuk ibadah dan refleksi diri.',
    'Soma':     'Baik untuk komunikasi dan membangun relasi.',
    'Anggara':  'Energi kuat untuk kerja keras dan tekad.',
    'Buda':     'Ideal untuk negosiasi, belajar, dan diskusi.',
    'Wraspati': 'Hari kebijaksanaan — baik untuk perencanaan.',
    'Sukra':    'Harmonis untuk seni, asmara, dan hubungan.',
    'Saniscara':'Hari introspeksi dan ritual spiritual.',
  };
  const pancaMap = {
    'Umanis': 'Awal yang baik untuk memulai sesuatu baru.',
    'Paing':  'Energi tajam untuk keputusan penting.',
    'Pon':    'Rezeki mengalir, cocok untuk bisnis.',
    'Wage':   'Hari introspeksi, hindari konflik.',
    'Kliwon': 'Hari sakral — perkuat doa dan meditasi.',
  };
  if (kualitas.kelas === 'istimewa') {
    if (kualitas.label.includes('Tumpek')) return `Hari Tumpek — sangat sakral dalam tradisi Bali. Lakukan persembahan dan hindari aktivitas besar duniawi.`;
    return `Kajeng Kliwon — hari penuh energi spiritual. Perbanyak doa dan ritual perlindungan, waspadai energi negatif.`;
  }
  const wukuTeks = kualitas.kelas === 'baik'
    ? `Wuku ${wuku.nama} memberi energi positif — ${wuku.rezeki.toLowerCase()}.`
    : kualitas.kelas === 'kurang'
    ? `Wuku ${wuku.nama} menyarankan kehati-hatian hari ini.`
    : `Wuku ${wuku.nama} memberikan energi cukup seimbang.`;
  return `${wukuTeks} ${saptaMap[saptaNama]||''} ${pancaMap[pancaNama]||''}`;
}

function cocokUntuk(kelas) {
  const map = {
    'baik':      'Membuka usaha · Perjalanan · Negosiasi · Lamaran',
    'sedang':    'Kegiatan rutin · Belajar · Berkumpul keluarga',
    'kurang':    'Istirahat · Introspeksi · Doa & meditasi',
    'istimewa':  'Persembahan · Meditasi · Ritual keagamaan',
  };
  return map[kelas] || '';
}

function hitungHarian() {
  const input = document.getElementById('tgl').value;
  if (!input) { alert('Hitung wuku lahir dulu'); return; }

  const ref = new Date('2002-01-06T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';

  for (let i = 0; i < 7; i++) {
    const tgl = new Date(today);
    tgl.setDate(today.getDate() + i);
    const selisih = Math.floor((tgl - ref) / 86400000);

    let posWuku = ((selisih % 210) + 210) % 210;
    let wuku = WUKU[Math.floor(posWuku / 7)];
    let sapta = SAPTAWARA[tgl.getDay()];
    let idxPanca = (4 + ((selisih % 5) + 5) % 5) % 5;
    let panca = PANCAWARA[idxPanca];

    const k = kualitasHari(sapta.urip, panca.urip, panca.nama, sapta.nama);
    const pred = prediksiTeks(wuku, sapta.nama, panca.nama, k);
    const cocok = cocokUntuk(k.kelas);
    const todayLabel = i === 0 ? ' <span style="font-size:0.7rem;color:#81c784;margin-left:6px;">(Hari ini)</span>' : '';
    const tglStr = `${HARI_NAMA[tgl.getDay()]}, ${tgl.getDate()} ${BULAN_NAMA[tgl.getMonth()]} ${tgl.getFullYear()}`;

    html += `<div class="hari-card ${k.kelas}">
      <div class="hari-header">
        <div>
          <div class="hari-tanggal">${tglStr}${todayLabel}</div>
          <div class="hari-wara">${sapta.nama} ${panca.nama} · Wuku ${wuku.nama}</div>
        </div>
        <span class="hari-badge ${k.badge}">${k.label}</span>
      </div>
      <div class="hari-prediksi">${pred}</div>
      <div class="hari-cocok">✦ Cocok untuk: ${cocok}</div>
    </div>`;
  }

  document.getElementById('list-harian').innerHTML = html;
  const el = document.getElementById('card-harian');
  el.style.display = 'block';
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'fadeUp 0.6s ease forwards';
  el.scrollIntoView({ behavior:'smooth', block:'start' });
}
